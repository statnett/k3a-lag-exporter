---
name: Delete Obsolete GHCR Images
on:
  schedule:
    - cron: "0 1 * * *"  # every day at midnight
  workflow_dispatch:

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/clean-ghcr.yaml@798a24dd2d10e188aa0fc06c62c519fddad84078 # main
    secrets: inherit
    permissions:
      packages: write
