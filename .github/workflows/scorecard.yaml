---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@798a24dd2d10e188aa0fc06c62c519fddad84078 # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
