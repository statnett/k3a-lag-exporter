---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@cd4e825f752b2c4c0909ad977ea8fdd96b6a9528 # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
