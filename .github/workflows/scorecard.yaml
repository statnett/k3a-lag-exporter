---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@d73574cafc9f815a9c5a0d876d9fa9590c72c5f9 # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
