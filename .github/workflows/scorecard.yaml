---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@42b657ebf74160507fdab018895ca57653b7a740 # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
