---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@9c4cba31f9b6489c923c93126572d58e30b9829d # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
