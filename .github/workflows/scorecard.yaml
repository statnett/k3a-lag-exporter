---
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches:
      - main

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/scorecard.yaml@e6814bd0c39d968bfd896cc5ae6de46fb055388e # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
