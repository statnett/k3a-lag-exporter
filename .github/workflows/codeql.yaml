---
name: CodeQL
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "34 0 * * 3"

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/codeql.yaml@6d4a134582c00edf0d1dfc1b297c4b8aeb775702 # main
    with:
      language: java
    permissions:
      actions: read
      contents: read
      security-events: write
