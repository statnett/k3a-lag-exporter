---
name: Lint PR
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/lint-pr.yaml@6d4a134582c00edf0d1dfc1b297c4b8aeb775702 # main
    permissions:
      pull-requests: write
      statuses: write
