---
name: Lint PR
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/lint-pr.yaml@42b657ebf74160507fdab018895ca57653b7a740 # main
    permissions:
      pull-requests: write
      statuses: write
