---
name: Lint PR
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/lint-pr.yaml@cd4e825f752b2c4c0909ad977ea8fdd96b6a9528 # main
    permissions:
      pull-requests: write
      statuses: write
