---
name: Lint PR
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
jobs:
  trigger:
    uses: statnett/github-workflows/.github/workflows/lint-pr.yaml@798a24dd2d10e188aa0fc06c62c519fddad84078 # main
    permissions:
      pull-requests: write
      statuses: write
